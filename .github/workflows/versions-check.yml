name: Dependency Version Report
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: temurin
          cache: maven
      - name: Display dependency updates
        run: mvn versions:display-dependency-updates versions:display-plugin-updates -B --no-transfer-progress 2>&1 | tee versions-report.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: versions-report
          path: versions-report.txt
          retention-days: 7
