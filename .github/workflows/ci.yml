name: CI

on:
  push:
    branches: [ "master", "fix/**", "feat/**", "task/**", "refactor/**", "docs/**", "test/**" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: ['11', '17', '21']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn verify -B -Dmaven.test.failure.ignore=false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java${{ matrix.java }}
          path: target/surefire-reports/

      - name: Upload WAR
        if: matrix.java == '11' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: ncwms-war
          path: target/*.war
          retention-days: 30
