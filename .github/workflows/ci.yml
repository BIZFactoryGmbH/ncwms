name: CI

on:
  push:
    branches: [ "master", "fix/**", "feat/**", "task/**", "refactor/**", "docs/**", "test/**" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: ['11', '17', '21']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn verify -B -Dmaven.test.failure.ignore=false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java${{ matrix.java }}
          path: target/surefire-reports/

      - name: Upload WAR
        if: matrix.java == '11' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: ncwms-war
          path: target/*.war
          retention-days: 30

  docker:
    name: Docker Build (Dockerfile lint + build check)
    runs-on: ubuntu-latest
    needs: build
    # Only run on master pushes — PRs don't need a full Docker build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # Ignore: DL3008 (pin apt versions, not practical here)
          #         DL3009 (delete apt lists, already done)
          ignore: DL3008,DL3009

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ncwms:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image metadata
        run: |
          echo "Image built successfully: ncwms:ci-${{ github.sha }}"
          docker images ncwms:ci-${{ github.sha }} 2>/dev/null || echo "Image in buildx cache"
